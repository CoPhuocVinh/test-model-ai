services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-agent-iot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ai-agent-iot-ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama"]
    command: ["pull", "qwen2.5:3b"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  mcp-device-server:
    build: ./mcp-device-server
    container_name: ai-agent-iot-mcp-device-server
    environment:
      - NODE_ENV=production
      - PORT=4001
      - MCP_PATH=/mcp
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  ai-gateway:
    build: ./ai-gateway
    container_name: ai-agent-iot-ai-gateway
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
      - MCP_DEVICE_SERVER_URL=http://mcp-device-server:4001/mcp
      - INTENT_CONFIDENCE_THRESHOLD=0.65
      - INTENT_PARSE_MAX_RETRIES=2
      - LLM_PARSE_TIMEOUT_MS=300000
      - LLM_NUM_PREDICT=220
      - MESSAGE_HISTORY_TURNS=5
      - PENDING_ACTION_TTL_SECONDS=300
    ports:
      - "4000:4000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      mcp-device-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
